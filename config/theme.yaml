# Theme — brand tokens from charte.html / input.css.
# Color names match the original Tailwind theme so classNames like
# bg-pourpre-light or text-bleu-fonce carry over unchanged.
colors:
  pourpre: '#F5004F'
  pourpre-hover: '#D10042'
  pourpre-light: '#FFF0F5'
  pourpre-lighter: '#FFE0EA'

  orange: '#FFAF00'
  orange-hover: '#E69E00'
  orange-light: '#FFF8E6'
  orange-lighter: '#FFF0D1'
  orange-vif: '#FF7000'
  orange-vif-light: '#FFF4E6'

  mauve: '#7B01FE'
  mauve-hover: '#6A01DB'
  mauve-light: '#F3E6FF'
  mauve-lighter: '#E6D1FF'

  cyan: '#12A19D'
  cyan-hover: '#0F8A87'
  cyan-light: '#E6F9F8'
  cyan-lighter: '#D1F2F0'

  # Bleu foncé — remplace le noir pour plus de cohérence avec la palette
  bleu-fonce: '#130077'
  bleu-fonce-light: '#E6E0FF'
  # Alpha variants (the renderer's class merge drops `/50`-style opacity
  # modifiers on link components, so they get dedicated tokens)
  bleu-fonce-50: '#13007780'
  bleu-fonce-70: '#130077B3'

fonts:
  title:
    family: Bely Display
    fallback: Archivo Black, cursive
    transform: lowercase
    letterSpacing: 0.05em
    # Local stylesheet carrying the @font-face rules (and global site styles).
    # Rendered as a <link rel="stylesheet"> on every page.
    url: /assets/site.css
  body:
    family: Neue Machina
    fallback: Space Grotesk, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif
    weights: [300, 400, 800]

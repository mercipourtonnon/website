# Testimonial card — vars carry FULL class tokens (the Tailwind scanner can't
# see classes assembled from fragments): $bg (bg-pourpre-light), $border
# (border-l-pourpre), $accent (text-pourpre), $quote, $author.
# NOTE: interactions on a template ROOT are dropped by component resolution,
# so the scroll-reveal lives on the inner card; the outer div only carries
# the masonry CSS hooks (.testimonial-card: break-inside + margin).
name: testimonial-card
type: container
props:
  className: testimonial-card
children:
  - type: container
    props:
      className: $bg rounded-2xl p-6 border-l-4 $border
    interactions:
      scroll:
        animation: fadeInUp
        threshold: 0.1
        once: true
    children:
      - type: text
        element: p
        props:
          className: text-gray-700 leading-relaxed italic mb-4
        content: $quote
      - type: text
        element: p
        props:
          className: font-bold $accent text-sm
        content: $author

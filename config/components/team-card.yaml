# Team flip card (flip on hover is pure CSS in /assets/site.css).
# Vars: $photo (/pictures/x.jpg), $alt, $name (lowercase display), $role,
# $bio, $photoBg (bg-orange-light), $backBg (bg-mauve), $roleAccent (text-mauve).
name: team-card
type: container
props:
  className: team-card h-96 perspective-1000 cursor-pointer
children:
  - type: container
    props:
      className: team-card-inner relative w-full h-full transition-transform duration-500 preserve-3d
    children:
      # Front
      - type: container
        props:
          className: team-card-front absolute w-full h-full backface-hidden bg-white rounded-lg overflow-hidden flex flex-col
        children:
          - type: container
            props:
              className: flex-1 flex items-center justify-center $photoBg
            children:
              - type: image
                props:
                  src: $photo
                  alt: $alt
                  width: 192
                  height: 192
                  loading: lazy
                  className: w-48 h-48 rounded-full object-cover border-4 border-white shadow-lg
          - type: container
            props:
              className: p-4 text-center
            children:
              - type: text
                element: h3
                props:
                  className: text-lg title-font text-gray-900
                content: $name
              - type: text
                element: p
                props:
                  className: $roleAccent font-semibold
                content: $role
      # Back
      - type: container
        props:
          className: team-card-back absolute w-full h-full backface-hidden $backBg text-white rounded-lg p-6 overflow-y-auto rotate-y-180
        children:
          - type: text
            element: h3
            props:
              className: text-lg title-font mb-2
            content: $name
          - type: text
            element: p
            props:
              className: text-sm mb-4 opacity-90
            content: $role
          - type: text
            element: p
            props:
              className: text-sm leading-relaxed
            content: $bio

# "Pour qui" card — vars: $bg (bg-pourpre-light), $icon (lucide name),
# $accent (text-pourpre), $title, $text. Full class tokens only.
name: audience-card
type: container
props:
  className: $bg rounded-lg p-6
children:
  - type: container
    props:
      className: mb-4
    children:
      - type: icon
        props:
          name: $icon
          className: w-10 h-10 $accent
  - type: text
    element: h3
    props:
      className: text-xl title-font $accent mb-3
    content: $title
  - type: text
    element: p
    props:
      className: text-gray-700
    content: $text

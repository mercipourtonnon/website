                          name: dilara simsek araiz
                          role: Facilitatrice
                          photoBg: bg-orange-light
                          backBg: bg-mauve
                          roleAccent: text-mauve
                          bio: Diplômée en droit international et action humanitaire, je développe mon expertise dans la gestion de projets associatifs, la formation et le partenariat. Je suis particulièrement sensible à toutes les questions liées au genre, la migration et les droits humains. M'engager au sein de Merci pour ton non est l'opportunité pour moi de mettre mes compétences au service d'une cause qui me tient à coeur et en cohérence avec mes valeurs.
                      - component: team-card
                        vars:
                          photo: /pictures/morgane.jpg
                          alt: Morgane Bourgeais
                          name: morgane bourgeais
                          role: Facilitatrice
                          photoBg: bg-orange-light
                          backBg: bg-mauve
                          roleAccent: text-mauve
                          bio: "Juriste en droits humains de formation, puis formatrice et animatrice de prévention en santé sexuelle et prévention des violences de genre, également conseillère conjugale et familiale… Bref j'ai plusieurs casquettes mais une même ligne motrice : accompagner et offrir des espaces communs et collectifs d'échanges pour améliorer nos relations intimes, individuelles et collectives et nous permettre de lutter efficacement contre les violences et les discriminations. Facilitatrice pour Merci pour ton non, j'ai rejoint l'asso pour travailler la question du consentement en profondeur et pour partager de beaux moments de réflexion avec l'espoir de faire bouger quelques lignes."
                      - component: team-card
                        vars:
                          photo: /pictures/mathilde.jpg
                          alt: Mathilde Brière
                          name: mathilde brière
                          role: Coprésidente, facilitatrice
                          photoBg: bg-orange-light
                          backBg: bg-mauve
                          roleAccent: text-mauve
                          bio: Psychologue sociale depuis 10 ans, je suis passionnée par les dynamiques de groupe. J'ai co-fondé l'association et je facilite ces ateliers car je crois profondément qu'essaimer une culture plus soucieuse du consentement transforme positivement nos relations et nos manières de faire société.
                      - component: team-card
                        vars:
                          photo: /pictures/thomas.jpg
                          alt: Thomas Jeanneau
                          name: thomas jeanneau
                          role: Coprésident, facilitateur
                          photoBg: bg-orange-light
                          backBg: bg-mauve
                          roleAccent: text-mauve
                          bio: En tant que personne ayant un vécu d'homme cisgenre hétéro dans une société patriarcale, j'ai été confronté à mon manque d'éducation au consentement dans mes relations. Coprésident de l'association, formé à la facilitation et au consentement par Zohra de Love Experience, je souhaite contribuer à une éducation populaire pour construire des relations plus apaisées dans notre société. Je met mon expérience en entrepreneuriat et en informatique au service des actions de Merci pour ton non.
                      - component: team-card
                        vars:
                          photo: /pictures/isabelle.jpg
                          alt: Isabelle Filin
                          name: isabelle filin
                          role: Pédagogie
                          photoBg: bg-orange-light
                          backBg: bg-cyan
                          roleAccent: text-cyan
                          bio: Travailleuse sociale spécialisée enfance et familles, je suis entrée dans l'association par la porte de la lutte contre les violences sexuelles et sexistes. Comprendre ses besoins, ses limites, et mieux les communiquer sont pour moi des compétences utiles à acquérir dès le plus jeune âge, et tout au long de la vie.
                      - component: team-card
                        vars:
                          photo: /pictures/elisa.jpg
                          alt: Elisa Garcia
                          name: elisa garcia
                          role: Communication
                          photoBg: bg-orange-light
                          backBg: bg-orange
                          roleAccent: text-orange
                          bio: Professionnelle de la communication depuis 8 ans, mes valeurs personnelles colorent mes créations et guident mes missions. Féministe et queer, je suis aussi engagée au sein du groupe Bipan Strasbourg. J'ai rejoint Merci pour ton non après avoir moi-même participé à un atelier de consentement. Aujourd'hui, je mets mes compétences au service de l'association pour faire rayonner ces valeurs de respect, d'écoute et d'émancipation auxquelles je crois profondément.
                      - component: team-card
                        vars:
                          photo: /pictures/maxime.jpg
                          alt: Maxime Chaboche
                          name: maxime chaboche
                          role: Support, administratif
                          photoBg: bg-pourpre-light
                          backBg: bg-pourpre
                          roleAccent: text-pourpre
                          bio: Issu·e d'une formation en ingénierie informatique et gestion de projets, j'ai depuis plusieurs années développé un attrait bien plus important pour les humain·es que les machines. Soucieux de comprendre nos relations à nous-même et aux autres, je m'intéresse, me forme et met en application ces sujets dans ma vie et mon entourage, dans l'espoir de rendre nos liens plus doux, authentiques et respectueux. Avec Merci pour ton non, j'espère pouvoir apporter ces valeurs au plus grand nombre.


    faqPage:
      '@context': https://schema.org
      '@type': FAQPage
      mainEntity:
        - '@type': Question
          name: Je connais déjà le consentement
          acceptedAnswer:
            '@type': Answer
            text: 'Super ! Cet atelier va au-delà de la théorie : tu vas pratiquer concrètement avec des exercices, identifier les biais subtils qui influencent tes choix, et muscler ta capacité à dire "non" dans des situations réelles.'
        - '@type': Question
          name: Je n'ai pas le temps
          acceptedAnswer:
            '@type': Answer
            text: 3 heures, c'est l'équivalent d'un long film. Mais contrairement à un film, tu repars avec des outils pratiques que tu utiliseras toute ta vie pour améliorer toutes tes relations. Un investissement qui vaut le coup !
        - '@type': Question
          name: J'ai peur que ce soit trop intense
          acceptedAnswer:
            '@type': Answer
            text: 'Le cadre est ultra sécurisant : tu n''es jamais obligé·e de partager ton vécu personnel, tu peux juste observer, et tout reste confidentiel. C''est ludique, bienveillant, et 100% respectueux de tes limites.'
        - '@type': Question
          name: Je ne peux pas me le permettre
          acceptedAnswer:
            '@type': Answer
            text: Prix libre = 0€ si nécessaire. Aucune justification demandée, aucun jugement. L'argent ne doit jamais être un obstacle à ta participation.
        - '@type': Question
          name: Comment fonctionne le prix libre ?
          acceptedAnswer:
            '@type': Answer
            text: Le prix libre signifie que tu donnes ce que tu veux et peux. Tu peux participer sans rien payer si c'est difficile pour toi. Si tu veux et peux soutenir l'association, ta contribution est bienvenue mais ne sera jamais obligatoire. Chacun·e participe selon ses moyens.
        - '@type': Question
          name: C'est uniquement sur le consentement sexuel ?
          acceptedAnswer:
            '@type': Answer
            text: 'Non ! L''atelier explore le consentement dans toutes les dimensions : amicales, familiales, professionnelles... Le consentement concerne tous nos rapports humains.'
        - '@type': Question
          name: Je suis timide, vais-je devoir parler ?
          acceptedAnswer:
            '@type': Answer
            text: Tu restes souverain·e ! Tu peux choisir de ne pas participer à certains exercices, juste observer, ou partir quand tu veux. Tout dans la bienveillance.
        - '@type': Question
          name: Je peux venir seul·e ?
          acceptedAnswer:
            '@type': Answer
            text: Bien sûr ! La plupart viennent seul·es. C'est même plus enrichissant pour rencontrer de nouvelles personnes dans un cadre bienveillant.
        - '@type': Question
          name: Je peux annuler ?
          acceptedAnswer:
            '@type': Answer
            text: Oui, tu peux annuler à tout moment ! Préviens-nous juste pour libérer ta place (6 à 15 personnes maximum).

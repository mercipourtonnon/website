              - type: container
                element: section
                props:
                  className: mb-8
                children:
                  - type: text
                    element: h2
                    props:
                      className: text-xl title-font text-orange mb-4
                    content: contact
                  - type: container
                    props:
                      className: space-y-3 text-gray-700 leading-relaxed
                    children:
                      - type: text
                        element: p
                        content: "Pour toute question concernant ces mentions légales ou l'utilisation de tes données personnelles, tu peux nous contacter :"
                      - type: list
                        props:
                          className: list-none space-y-2 ml-4
                        children:
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Email :"
                              - type: text
                                element: span

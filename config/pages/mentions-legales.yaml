                        props:
                          className: mt-4
                        content: L'association Merci pour ton non met tout en œuvre pour assurer l'accessibilité et la disponibilité du site. Toutefois, nous ne pouvons être tenus responsables des difficultés d'accès temporaires liées à des problèmes techniques indépendants de notre volonté, à la maintenance programmée, ou aux caractéristiques de ton équipement.

              # Section 4: Protection des données personnelles (RGPD)
              - type: container
                element: section

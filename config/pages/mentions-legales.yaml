name: mentions-legales
path: /mentions-legales
sitemap:
  priority: 0.3
  changefreq: yearly
meta:
  lang: fr-FR
  title: Mentions légales - Merci pour ton non
  description: Mentions légales de l'association Merci pour ton non - Informations légales, éditeur, hébergement, RGPD et protection des données.
  robots: index, follow
  canonical: https://mercipourtonnon.fr/mentions-legales
  favicons:
    icon: /favicon/favicon-32x32.png
    appleTouchIcon: /favicon/apple-touch-icon.png
    sizes:
      - size: 32x32
        href: /favicon/favicon-32x32.png
      - size: 16x16
        href: /favicon/favicon-16x16.png
  preload:
    - href: /fonts/NeueMachina/NeueMachina-Regular.otf
      as: font
      type: font/otf
      crossorigin: anonymous
    - href: /fonts/BelyDisplay/BelyDisplay-Regular.woff2
      as: font
      type: font/woff2
      crossorigin: anonymous
  customElements:
    - type: link
      attrs:
        rel: manifest
        href: /favicon/site.webmanifest

                      - type: text
                        element: p
                        content: Toute exploitation non autorisée du site ou de l'un des éléments qu'il contient sera considérée comme constitutive d'une contrefaçon et poursuivie conformément aux dispositions des articles L.335-2 et suivants du Code de Propriété Intellectuelle.

              # Section 7: Limitation de responsabilité
              - type: container
                element: section
                props:
                  className: mb-12
                children:
                  - type: text
                    element: h2
                    props:
                      className: text-xl title-font text-orange mb-4
                    content: limitation de responsabilité
                  - type: container
                    props:
                      className: space-y-3 text-gray-700 leading-relaxed
                    children:
                      - type: text
                        element: p
                        content: L'association Merci pour ton non s'efforce d'assurer l'exactitude et la mise à jour des informations diffusées sur ce site. Toutefois, elle ne peut garantir l'exactitude, la précision ou l'exhaustivité des informations mises à disposition.
                      - type: text
                        element: p
                        content: "L'association ne saurait être tenue responsable :"
                      - type: list
                        props:
                          className: list-disc list-inside space-y-2 ml-4
                        children:
                          - type: list-item
                            content: Des dommages directs ou indirects résultant de l'accès au site ou de son utilisation
                          - type: list-item
                            content: Des interruptions temporaires d'accès au site pour des opérations de maintenance ou pour toute autre raison
                          - type: list-item
                            content: Du contenu des sites externes vers lesquels le site renvoie par des liens hypertextes

              # Section 8: Liens hypertextes
              - type: container
                element: section
                props:
                  className: mb-12
                children:
                  - type: text
                    element: h2
                    props:
                      className: text-xl title-font text-orange mb-4
                    content: liens hypertextes
                  - type: container

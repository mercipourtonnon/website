                    props:
                      className: text-xl title-font text-mauve mb-3 mt-6
                    content: tes droits
                  - type: container
                    props:
                      className: space-y-3 text-gray-700 leading-relaxed
                    children:
                      - type: text
                        element: p
                        content: "Conformément au RGPD et à la loi Informatique et Libertés, tu disposes des droits suivants :"
                      - type: list
                        props:
                          className: list-disc list-inside space-y-2 ml-4
                        children:
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Droit d'accès :"
                              - type: text
                                element: span
                                content: " Tu peux demander l'accès aux données personnelles que nous détenons sur toi"
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Droit de rectification :"
                              - type: text
                                element: span
                                content: " Tu peux demander la correction de données inexactes ou incomplètes"
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Droit à l'effacement :"
                              - type: text
                                element: span
                                content: " Tu peux demander la suppression de tes données personnelles"
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Droit à la limitation du traitement :"
                              - type: text
                                element: span
                                content: " Tu peux demander la limitation du traitement de tes données"
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Droit à la portabilité :"
                              - type: text
                                element: span
                                content: " Tu peux demander de recevoir tes données dans un format structuré"
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Droit d'opposition :"
                              - type: text
                                element: span
                                content: " Tu peux t'opposer au traitement de tes données"
                      - type: text

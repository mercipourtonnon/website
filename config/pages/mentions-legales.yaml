                              - type: text
                                element: span
                                content: " pour plus d'informations."
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Statistiques de navigation :"
                              - type: text
                                element: span
                                content: " Via Plausible Analytics, un outil respectueux de la vie privée qui ne collecte aucune donnée personnelle identifiable et ne pose pas de cookies de tracking."

                  - type: text

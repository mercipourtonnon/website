      - type: container
        element: nav
        props:
          className: fixed top-0 left-0 right-0 z-50 w-full bg-white bg-opacity-90 backdrop-blur-sm shadow-lg
        children:
          - type: container
            props:
              className: max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4
            children:

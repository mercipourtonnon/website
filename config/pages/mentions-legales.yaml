                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            content: "La mise en place de liens hypertextes vers le site mercipourtonnon.fr nécessite une autorisation préalable. Pour toute demande, contacte-nous à : "
                          - type: link
                            props:
                              href: mailto:mercipourtonnon@gmail.com
                              className: text-orange hover:underline
                            content: mercipourtonnon@gmail.com

              # Section 9: Droit applicable
              - type: container
                element: section
                props:
                  className: mb-12
                children:
                  - type: text
                    element: h2
                    props:
                      className: text-xl title-font text-orange mb-4
                    content: droit applicable et juridiction compétente
                  - type: container
                    props:
                      className: space-y-3 text-gray-700 leading-relaxed
                    children:
                      - type: text

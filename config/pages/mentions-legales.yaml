                        children:
                          - type: text
                            element: span
                            content: "Si tu estimes que tes droits ne sont pas respectés, tu peux déposer une réclamation auprès de la CNIL (Commission Nationale de l'Informatique et des Libertés) : "
                          - type: link
                            props:
                              href: https://www.cnil.fr
                              target: _blank
                              rel: noopener noreferrer
                              className: text-orange hover:underline
                            content: www.cnil.fr

                  - type: text
                    element: h3
                    props:
                      className: text-xl title-font text-mauve mb-3 mt-6
                    content: durée de conservation
                  - type: text
                    element: p
                    props:
                      className: text-gray-700 leading-relaxed
                    content: Tes données personnelles sont conservées uniquement le temps nécessaire à la réalisation des finalités pour lesquelles elles ont été collectées, conformément aux obligations légales applicables.

              # Section 5: Cookies
              - type: container
                element: section
                props:
                  className: mb-12
                children:
                  - type: text
                    element: h2
                    props:
                      className: text-xl title-font text-orange mb-4
                    content: cookies
                  - type: container
                    props:
                      className: space-y-3 text-gray-700 leading-relaxed
                    children:
                      - type: text
                        element: p
                        content: "Notre site utilise des cookies techniques nécessaires au bon fonctionnement du site. Le formulaire d'inscription à la newsletter (Brevo) peut utiliser des cookies techniques nécessaires à son fonctionnement. Nous utilisons également Plausible Analytics, qui est une solution d'analyse web respectueuse de la vie privée :"
                      - type: list
                        props:
                          className: list-disc list-inside space-y-2 ml-4
                        children:
                          - type: list-item
                            content: Ne collecte aucune donnée personnelle identifiable
                          - type: list-item

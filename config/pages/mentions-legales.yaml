                          className: list-disc list-inside space-y-2 ml-4
                        children:
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "JavaScript activé :"
                              - type: text
                                element: span
                                content: " Le site utilise JavaScript pour le menu de navigation mobile, les animations et certaines interactions. Certaines fonctionnalités peuvent être limitées si JavaScript est désactivé."
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Navigateur moderne :"
                              - type: text
                                element: span
                                content: " Nous recommandons d'utiliser les versions récentes de Chrome, Firefox, Safari ou Edge pour une expérience optimale."
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Hébergement européen :"
                              - type: text
                                element: span
                                content: " Toutes les données du site sont hébergées dans l'Union européenne (via GitHub Pages/Microsoft), garantissant la conformité avec le RGPD."
                      - type: text

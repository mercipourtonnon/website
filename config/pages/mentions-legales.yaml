                    props:
                      className: text-xl title-font text-mauve mb-3 mt-6
                    content: finalité du traitement
                  - type: text
                    element: p
                    props:
                      className: text-gray-700 leading-relaxed
                    content: "Les données collectées sont utilisées uniquement pour :"
                  - type: list
                    props:
                      className: list-disc list-inside space-y-2 ml-4 text-gray-700
                    children:
                      - type: list-item
                        content: Gérer les inscriptions aux ateliers
                      - type: list-item
                        content: Te contacter concernant les ateliers auxquels tu t'es inscrit·e
                      - type: list-item
                        content: T'envoyer notre newsletter si tu t'y es inscrit·e (actualités, dates d'ateliers, ressources sur le consentement)
                      - type: list-item
                        content: Améliorer l'expérience utilisateur du site
                      - type: list-item
                        content: Répondre à tes demandes d'information

                  - type: text

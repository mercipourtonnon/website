                                  href: mailto:mercipourtonnon@gmail.com
                                  className: text-orange hover:underline
                                content: mercipourtonnon@gmail.com
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Adresse postale :"
                              - type: text
                                element: span
                                content: " 249 avenue de Colmar, 67100 Strasbourg"
                          - type: list-item
                            children:
                              - type: text
                                element: span
                                props:
                                  className: font-bold
                                content: "Site web :"
                              - type: text
                                element: span
                                content: " "
                              - type: link
                                props:
                                  href: https://mercipourtonnon.fr
                                  className: text-orange hover:underline

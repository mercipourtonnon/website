                          - type: link
                            props:
                              href: https://plausible.io/privacy-focused-web-analytics
                              target: _blank
                              rel: noopener noreferrer
                              className: text-orange hover:underline
                            content: plausible.io/privacy-focused-web-analytics

              # Section 6: Propriété intellectuelle
              - type: container
                element: section
                props:
                  className: mb-12
                children:
                  - type: text
                    element: h2
                    props:
                      className: text-xl title-font text-orange mb-4

                  - type: container
                    props:
                      className: space-y-3 text-gray-700 leading-relaxed
                    children:
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Nom de l'association :"
                          - type: text
                            element: span
                            content: " Merci pour ton non"
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Forme juridique :"
                          - type: text
                            element: span
                            content: " Association de droit local (Bas-Rhin, Haut-Rhin et Moselle)"
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "SIREN :"
                          - type: text
                            element: span
                            content: " 993 877 893"
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "SIRET :"
                          - type: text
                            element: span
                            content: " 993 877 893 00012"
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Code NAF/APE :"
                          - type: text
                            element: span
                            content: " 94.99Z (Autres organisations fonctionnant par adhésion volontaire)"
                      - type: customHTML
                        content: "<p><strong>Siège social :</strong><br />249 avenue de Colmar<br />67100 Strasbourg<br />France</p>"
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Email :"
                          - type: text
                            element: span
                            content: " "
                          - type: link
                            props:
                              href: mailto:mercipourtonnon@gmail.com
                              className: text-orange hover:underline
                            content: mercipourtonnon@gmail.com
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Site web :"
                          - type: text
                            element: span
                            content: " "
                          - type: link
                            props:
                              href: https://mercipourtonnon.fr
                              className: text-orange hover:underline
                            content: https://mercipourtonnon.fr
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Objet de l'association :"
                          - type: text
                            element: span
                            content: " L'association œuvre à diffuser une culture du consentement auprès de chaque citoyen·ne, dans une démarche d'éducation populaire en Alsace. Elle crée des espaces de réflexion et de pratique où chacun·e peut explorer les enjeux du consentement - dans son rapport à soi, à l'autre et à la société."
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Directeur·ice de publication :"
                          - type: text
                            element: span
                            content: " Mathilde Brière et Thomas Jeanneau, co-président·es de l'association Merci pour ton non"
                      - type: text
                        element: p
                        children:
                          - type: text
                            element: span
                            props:
                              className: font-bold
                            content: "Date de création :"
                          - type: text
                            element: span
                            content: " 24 octobre 2025"

              # Section 2: Hébergement
              - type: container
                element: section
                props:
                  className: mb-12
                children:
                  - type: text

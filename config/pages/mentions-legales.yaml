                    props:
                      className: text-xl title-font text-orange mb-4
                    content: limitations techniques
                  - type: container
                    props:
                      className: space-y-3 text-gray-700 leading-relaxed
                    children:
                      - type: text
                        element: p
                        content: "Le site mercipourtonnon.fr utilise les technologies web modernes pour te garantir la meilleure expérience possible. Pour profiter pleinement de toutes les fonctionnalités du site, nous te recommandons :"
